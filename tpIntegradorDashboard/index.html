<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro-Arcade Zone - Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="shortcut icon" href="assets/img/favicon-32x32.png">
    <script defer src="js/main.js"></script>
    <script>
        (function() {const temaGuardado = localStorage.getItem("temaArcade") || "dark"; document.documentElement.setAttribute("data-theme", temaGuardado);})();
    </script>
</head>
<body>
    <header>
        <div class="logo">
            <a href="index.html" class="logo-container">
                <img src="assets/img/logoretro.png" alt="logo arcade">
            </a>
        </div>
        <ul class="enlaces">
            <li class="enlace"><a href="index.html"><span>VER</span></a></li>
            <li class="enlace"><a href="get.html"><span>CONSULTAR</span></a></li>
            <li class="enlace"><a href="post.html"><span>CREAR</span></a></li>
            <li class="enlace"><a href="put.html"><span>MODIFICAR</span></a></li>
            <li class="enlace"><a href="delete.html"><span>ELIMINAR</span></a></li>
        </ul>
        <button id="btn-tema" onclick="alternarTema()" style="background: none; border: 1px solid var(--accent-neon); padding: 5px 5px; cursor: pointer; border-radius: 8px;">🌙</button>
    </header>

    <main>
        <section class="secccion-productos">
            <h2>Nuestros productos</h2>
            
            <div id="contenedor-productos"></div>
        </section>
    </main>

    <script>
        const contenedorProductos = document.getElementById("contenedor-productos");

        async function mostrarProductos () {
            try {
                const response = await fetch("http://localhost:3000/api/products");
                const datos = await response.json();

                if(!response.ok) {
                    throw new Error(`Error: ${response.status} ${response.message}`);
                }

                const productos = datos.payload;
                console.log(productos);

                renderizarProductos(productos);

            } catch (error) {
                console.error(`Error al cargar productos: ${error}`);

                contenedorProductos.innerHTML = `
                    <p class="mensaje-error" style="color: #ff6b6b; font-weight: bold;">${error}</p>
                `;
            }
        }

        function renderizarProductos(array) {
            let htmlProductos = "";
        
            if (array.length === 0) {
                contenedorProductos.innerHTML = "<p>No hay fichines cargados en el catálogo.</p>";
                return;
            }

            array.forEach(producto => {
                htmlProductos += `
                <div class="card-producto">
                    <img src="${producto.image}" alt="${producto.name}">
                    <h4>${producto.name}</h4>
                    <p>Id: ${producto.id}</p>
                    <p class="precio">$${producto.price}</p>
                </div>
                `;
            });

            // inyectamos en el DOM una sola vez al terminar el bucle
            contenedorProductos.innerHTML = htmlProductos;
        }

        mostrarProductos();    
    </script>
</body>
</html>
