<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro-Arcade Zone - Eliminar Producto</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="shortcut icon" href="assets/img/favicon-32x32.png">
    <script defer src="js/main.js"></script>       
    <script>
        (function() {const temaGuardado = localStorage.getItem("temaArcade") || "dark"; document.documentElement.setAttribute("data-theme", temaGuardado);})();
    </script>
</head>
<body>
    <header>
        <div class="logo">
            <a href="index.html" class="logo-container">
                <img src="assets/img/logoretro.png" alt="logo arcade">
            </a>
        </div>
        <ul class="enlaces">
            <li class="enlace"><a href="index.html"><span>VER</span></a></li>
            <li class="enlace"><a href="get.html"><span>CONSULTAR</span></a></li>
            <li class="enlace"><a href="post.html"><span>CREAR</span></a></li>
            <li class="enlace"><a href="put.html"><span>MODIFICAR</span></a></li>
            <li class="enlace"><a href="delete.html"><span>ELIMINAR</span></a></li>
        </ul>
        <button id="btn-tema" onclick="alternarTema()" style="background: none; border: 1px solid var(--accent-neon); padding: 5px 5px; cursor: pointer; border-radius: 8px;">🌙</button>
    </header>

    <main>
        <section class="form-productos">
            <h2>Eliminar Fichín por ID</h2>
            
            <form id="deleteProduct-form">
                <label for="idProdDelete">ID del Producto a dar de baja</label>
                <input type="number" id="idProdDelete" required placeholder="Ej: 1">
                <div>
                    <input type="submit" value="Dar de Baja Permanentemente" style="background-color: var(--btn-danger); color: #fff;">
                </div>
            </form>
        </section>
    </main>

    <script>
        const deleteForm = document.getElementById("deleteProduct-form");
        deleteForm.addEventListener("submit", async event => {
            event.preventDefault();
            const id = document.getElementById("idProdDelete").value.trim();  
            // Cuadro de confirmación de seguridad 
            const confirmacion = confirm(`¿Estás completamente segura de eliminar el fichín con ID ${id}? Esta acción no se puede deshacer.`);
            
            if(!confirmacion) {
                alert("Operación cancelada. El fichín sigue a salvo.");
                return;
            }

            try {
                // Mandamos la solicitud DELETE colgando el ID en la URL
                const response = await fetch(`http://localhost:3000/api/products/${id}`, {
                    method: "DELETE"
                });

                const result = await response.json();

                if(response.ok) {
                    alert(result.message);
                    deleteForm.reset(); // Limpiamos el casillero
                } else {
                    alert(`Error del Servidor: ${result.error || result.message}`);
                }

            } catch (error) {
                console.error("Error al intentar borrar:", error);
                alert("Error de conexión con el servidor backend.");
            }
        });
    </script>
</body>
</html>
