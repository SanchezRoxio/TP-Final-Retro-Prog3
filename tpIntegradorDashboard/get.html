<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro-Arcade Zone - Consultar Producto</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="shortcut icon" href="assets/img/favicon-32x32.png">
    <script defer src="js/main.js"></script>
    <script>
        (function() {const temaGuardado = localStorage.getItem("temaArcade") || "dark"; document.documentElement.setAttribute("data-theme", temaGuardado);})();
    </script>
</head>
<body>
    <header>
        <div class="logo">
            <a href="index.html" class="logo-container">
                <img src="assets/img/logoretro.png" alt="logo arcade">
            </a>
        </div>
        <ul class="enlaces">
            <li class="enlace"><a href="index.html"><span>VER</span></a></li>
            <li class="enlace"><a href="get.html"><span>CONSULTAR</span></a></li>
            <li class="enlace"><a href="post.html"><span>CREAR</span></a></li>
            <li class="enlace"><a href="put.html"><span>MODIFICAR</span></a></li>
            <li class="enlace"><a href="delete.html"><span>ELIMINAR</span></a></li>
        </ul>
        <button id="btn-tema" onclick="alternarTema()" style="background: none; border: 1px solid var(--accent-neon); padding: 5px 5px; cursor: pointer; border-radius: 8px;">🌙</button>
    </header>

    <main>
        <section class="form-productos">
            <h2>Consultar producto por id:</h2>
            
            <form id="getProduct-form">
                <label for="idProd">Id del producto</label>
                <input type="number" name="idProd" id="idProd" required placeholder="Ej: 1">

                <input type="submit" value="Consultar producto">
            </form>
        </section>

        <section class="secccion-productos">
            <div id="contenedor-productos"></div>
        </section>
    </main>

    <script>
        const contenedorProductos = document.getElementById("contenedor-productos");
        const getProductForm = document.getElementById("getProduct-form");

        getProductForm.addEventListener("submit", async event => {
            event.preventDefault(); 

            const idProd = event.target.idProd.value.trim();
            
            try {
                const response = await fetch(`http://localhost:3000/api/products/${idProd}`);
                const datos = await response.json();
                const producto = datos.payload;

                if (!producto) {
                    contenedorProductos.innerHTML = `<p style="color: var(--btn-danger); font-weight: bold; text-align: center;">No se encontró ningún fichín con el ID ${idProd}</p>`;
                    return;
                }

                renderizarProducto(producto);

            } catch (error) {
                console.error("Error al obtener el producto", error);
                contenedorProductos.innerHTML = `<p style="color: var(--btn-danger); font-weight: bold; text-align: center;">Error de conexión con el servidor.</p>`;
            }
        });

        function renderizarProducto(producto) {
            let htmlProducto = `
            <div class="card-producto">
                <img src="${producto.image}" alt="${producto.name}">
                <h4>${producto.name}</h4>
                <p>Id: ${producto.id}</p>
                <p class="precio">$${producto.price}</p>
            </div>
            `;

            contenedorProductos.innerHTML = htmlProducto;
        }
    </script>
</body>
</html>
