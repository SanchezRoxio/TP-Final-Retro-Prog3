<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="shortcut icon" href="assets/img/favicon-32x32.png">
    <script defer src="js/main.js"></script>
    <script>
        (function() {const temaGuardado = localStorage.getItem("temaArcade") || "dark"; document.documentElement.setAttribute("data-theme", temaGuardado);})();
    </script>
</head>
<body>
    <header>
        <div class="logo">
            <a href="index.html" class="logo-container">
                <img src="assets/img/logoretro.png" alt="logo arcade">
            </a>
        </div>
        <ul class="enlaces">
            <li class="enlace"><a href="index.html"><span>VER</span></a></li>
            <li class="enlace"><a href="get.html"><span>CONSULTAR</span></a></li>
            <li class="enlace"><a href="post.html"><span>CREAR</span></a></li>
            <li class="enlace"><a href="put.html"><span>MODIFICAR</span></a></li>
            <li class="enlace"><a href="delete.html"><span>ELIMINAR</span></a></li>
        </ul>
        <button id="btn-tema" onclick="alternarTema()" style="background: none; border: 1px solid var(--accent-neon); padding: 5px 5px; cursor: pointer; border-radius: 8px;">🌙</button>
    </header>

    <main>

    <section class="form-productos">
            <h2>Crear producto</h2>
            
            <form id="postProduct-form" class="form-alta">
                <label for="nameProd">Nombre</label>
                <input type="text" name="name" id="nameProd" required>

                <label for="imageProd">Imagen</label>
                <input type="text" name="image" id="imageProd" required>

                <label for="categoryProd">Categoria</label>
                <select name="category" id="categoryProd" required>
                        <option>Seleccione un tipo de fichin...</option>
                        <option value="classic">Clásico Retro (80s)</option>
                        <option value="fighting">Lucha / Pelea (90s)</option>
                        <option value="racing">Simulador / Carreras</option>
                </select>

                <label for="priceProd">Precio</label>
                <input type="number" name="price" id="priceProd" required>
                
                <div>
                    <input type="submit" value="Crear producto">
                </div>
            </form>

    </section>
        <section class="secccion-productos">
            <div id="contenedor-productos"></div>
        </section>
    </main>

    <script>
        const contenedorProductos = document.getElementById("contenedor-productos");
        const postProductForm = document.getElementById("postProduct-form");

        postProductForm.addEventListener("submit", async event => {
            event.preventDefault(); // Detenemos el envio por defecto del formulario

            /* Obtenemos la data del formulario:
                1. Transformamos la informacion del form en un objeto FormData
                2. Transformamos la info del FormData a un objeto normal JS
                3. Con la info en objetos JS, lo enviamos en el body de la request
            */

            // Obtenemos la info del formulario
            const formData = new FormData(event.target); // Guardamos la info del form en un objeto nativo FormData
            console.log(formData);

            // Transformamos este objeto nativo en un objeto JavaScript normal
            const data = Object.fromEntries(formData.entries());
            console.log(data);
            // La idea de esto es poder parsear este objeto como JSON en el body de la peticion
            // Ahora este objeto ya puede enviarse anexado al cuerpo (body) de la peticion HTTP (HTTP Request)
            try {
                const url = "http://localhost:3000/api/products"
                const response = await fetch(url, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify(data)
                });

                console.log(response);
                const result = await response.json();
                alert(result.message);
                console.log(result.message);

                // limpiamos el formulario tras un envío exitoso
                if(response.ok) {
                    postProductForm.reset();
                }

            } catch (error) {
                console.error("Error al enviar los datos: ", error);
            }

        });
        
    </script>
</body>
</html>
