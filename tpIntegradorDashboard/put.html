<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro-Arcade Zone - Modificar Producto</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="shortcut icon" href="assets/img/favicon-32x32.png">
    <script defer src="js/main.js"></script>
    <script>
        (function() {const temaGuardado = localStorage.getItem("temaArcade") || "dark"; document.documentElement.setAttribute("data-theme", temaGuardado);})();
    </script>
</head>
<body>
    <header>
        <div class="logo">
            <a href="index.html" class="logo-container">
                <img src="assets/img/logoretro.png" alt="logo arcade">
            </a>
        </div>
        <ul class="enlaces">
            <li class="enlace"><a href="index.html"><span>VER</span></a></li>
            <li class="enlace"><a href="get.html"><span>CONSULTAR</span></a></li>
            <li class="enlace"><a href="post.html"><span>CREAR</span></a></li>
            <li class="enlace"><a href="put.html"><span>MODIFICAR</span></a></li>
            <li class="enlace"><a href="delete.html"><span>ELIMINAR</span></a></li>
        </ul>
        <button id="btn-tema" onclick="alternarTema()" style="background: none; border: 1px solid var(--accent-neon); padding: 5px 5px; cursor: pointer; border-radius: 8px;">🌙</button>
    </header>

    <main>

        <section class="form-productos">
            <h2>Modificar producto por id: </h2>
            
            <form id="getProduct-form">
                <label for="idProd">Id del producto</label>
                <input type="number" name="idProd" id="idProd" required>

                <input type="submit" value="Consultar producto">
            </form>
        </section>

        <section class="secccion-productos">
            <hr style="border: 1px dashed var(--accent-neon); margin-bottom: 30px;">
            <div id="contenedor-productos"></div>  
            <div id="contenedor-form" class="form-productos" style="display: none; margin-top: 30px;"></div>
        </section>
    </main>

    <script>
        const contenedorProductos = document.getElementById("contenedor-productos");
        const getProductForm = document.getElementById("getProduct-form");
        const contenedorForm = document.getElementById("contenedor-form");

        getProductForm.addEventListener("submit", async event => {
            event.preventDefault(); 

            const idProd = event.target.idProd.value.trim();
            
            try {
                const response = await fetch(`http://localhost:3000/api/products/${idProd}`);
                console.log(response);

                const datos = await response.json();
                const producto = datos.payload;

                console.log(producto); 

                if (!producto) {
                    contenedorProductos.innerHTML = "<p style='color: #ff073a; font-weight: bold;'>Producto no encontrado en la base de datos.</p>";
                    contenedorForm.style.display = "none";
                    return;
                }

                renderizarProducto(producto);

            } catch (error) {
                console.error("Error al obtener el producto", error);
            }
        });

        function renderizarProducto(producto) {
            contenedorForm.style.display = "none";

            let htmlProducto = `
            <div class="card-producto">
                <img src="${producto.image}" alt="${producto.name}">
                <h4>${producto.name}</h4>
                <p>Id: ${producto.id}</p>
                <p class="precio">$${producto.price}</p>
                <input type="button" id="updateProduct-button" value="Actualizar Producto" style="background-color: var(--accent-neon); color: #000; font-weight: bold; border-radius: 8px; padding: 10px; width: 100%; cursor: pointer; border: none; margin-top: 10px; text-transform: uppercase;">
            </div>
            `;

            contenedorProductos.innerHTML = htmlProducto;

            const updateProductButton = document.getElementById("updateProduct-button");

            updateProductButton.addEventListener("click", event => {
                event.stopPropagation(); // Evitamos la propagacion de eventos
                formularioPutProducto(event, producto);
            });
        }

        function formularioPutProducto(event, producto) {
            event.stopPropagation();
            console.log(producto);

            let htmlUpdateForm = `
                <h2>Actualizar producto</h2>
            
                <form id="updateProduct-form">
                    <input type="hidden" id="idProd" name="id" value="${producto.id}">
                    <label for="nameProd">Nombre</label>
                    <input type="text" name="name" id="nameProd" value="${producto.name}" required>

                    <label for="imageProd">Imagen</label>
                    <input type="text" name="image" id="imageProd" value="${producto.image}" required>

                    <label for="categoryProd">Categoria</label>
                    <select name="category" id="categoryProd" required>
                        <option value="classic" ${producto.category === 'classic' ? 'selected' : ''}>Clásico Retro (80s)</option>
                        <option value="fighting" ${producto.category === 'fighting' ? 'selected' : ''}>Lucha / Pelea (90s)</option>
                        <option value="racing" ${producto.category === 'racing' ? 'selected' : ''}>Simulador / Carreras</option>
                    </select>

                    <label for="priceProd">Precio</label>
                    <input type="number" name="price" id="priceProd" value="${producto.price}" required>

                    <label for="activeProd">Estado</label>
                    <select name="active" id="activeProd" required>
                        <option value="1" ${producto.active == 1 ? 'selected' : ''}>Activo</option>
                        <option value="0" ${producto.active == 0 ? 'selected' : ''}>Oculto / Inactivo</option>
                    </select>
                    
                    <div>
                        <input type="submit" value="Confirmar Cambios en Servidor">
                    </div>
                </form>
            `;

            contenedorForm.innerHTML = htmlUpdateForm;
            contenedorForm.style.display = "block";

            const updateProductForm = document.getElementById("updateProduct-form");

            updateProductForm.addEventListener("submit", event => {
                actualizarProducto(event); 
            });
        }

        async function actualizarProducto(event) {
            event.preventDefault();

            const confirmacion = confirm("¿Querés actualizar este producto?");
            
            if(!confirmacion) {
                alert("Actualización cancelada");
                return;
            }

            const id = document.getElementById("idProd").value;
            const formData = new FormData(event.target);
            const data = Object.fromEntries(formData.entries());
            console.table(data);
            
            try {
                const response = await fetch("http://localhost:3000/api/products", {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(data)
                });

                console.log(response);
                const result = await response.json();

                if(response.ok) {
                    console.log(result.message);
                    alert(result.message);
                    contenedorForm.innerHTML = "";
                    contenedorForm.style.display = "none";
                    contenedorProductos.innerHTML = "";
                    getProductForm.reset();

                } else {
                    console.error("Error:", result.message);
                    alert(`Error del servidor: ${result.message}`);
                }

            } catch (error) {
                console.error("Error al enviar los datos: ", error.message);
                alert("Error al conectar con el servidor backend.");
            }
        }
    </script>
</body>
</html>
